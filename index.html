<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<link rel="manifest" href="manifest.json">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>🍪 Cookie Clicker 3D</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@600;700;900&display=swap');
:root{
  --gold:#FFD700;--orange:#FF8C00;--red:#FF4500;
  --dark:#0d0500;--panel:rgba(15,5,0,0.93);--border:rgba(255,140,0,0.25);
  --safe-top:env(safe-area-inset-top,0px);--safe-bot:env(safe-area-inset-bottom,0px);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{width:100%;height:100%;overflow:hidden;background:#0d0500;font-family:'Nunito',sans-serif;color:#fff;touch-action:manipulation;}
#bgCanvas{position:fixed;inset:0;width:100%;height:100%;z-index:0;pointer-events:none;}
.screen{position:fixed;inset:0;z-index:10;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity .5s ease,transform .5s cubic-bezier(.34,1.56,.64,1);}
.screen.hidden{opacity:0;pointer-events:none;transform:scale(.88) translateY(40px);}

/* ── MENU ── */
#menuScreen{background:radial-gradient(ellipse at 50% 40%,rgba(180,80,0,.35) 0%,rgba(13,5,0,.95) 70%);gap:0;}
.menu-cookie{font-size:clamp(80px,22vw,140px);animation:floatCook 3s ease-in-out infinite;filter:drop-shadow(0 0 25px #FF8C00) drop-shadow(0 0 50px #FFD700);user-select:none;line-height:1;margin-bottom:8px;}
@keyframes floatCook{0%,100%{transform:translateY(0) rotate(-4deg) scale(1);}50%{transform:translateY(-18px) rotate(4deg) scale(1.06);}}
.game-title{font-family:'Fredoka One',cursive;font-size:clamp(42px,13vw,72px);background:linear-gradient(135deg,#FFD700,#FF8C00,#FF4500);-webkit-background-clip:text;-webkit-text-fill-color:transparent;filter:drop-shadow(0 3px 14px rgba(255,140,0,.7));animation:titleGlow 2s ease-in-out infinite;line-height:1;}
@keyframes titleGlow{0%,100%{filter:drop-shadow(0 3px 14px rgba(255,140,0,.7));}50%{filter:drop-shadow(0 3px 28px rgba(255,215,0,1));}}
.menu-sub{font-size:clamp(11px,3.5vw,16px);letter-spacing:3px;text-transform:uppercase;color:#FFD700;opacity:.7;margin:8px 0 32px;}
.btn-play{font-family:'Fredoka One',cursive;font-size:clamp(24px,7vw,38px);padding:18px 70px;border:none;border-radius:60px;background:linear-gradient(135deg,#FF8C00,#FF4500);color:#fff;cursor:pointer;box-shadow:0 8px 30px rgba(255,100,0,.55);animation:playPulse 1.6s ease-in-out infinite;position:relative;overflow:hidden;transition:transform .12s;}
.btn-play::after{content:'';position:absolute;inset:-3px;border-radius:60px;background:conic-gradient(#FFD700,#FF8C00,#FF4500,#FFD700);z-index:-1;animation:spinBorder 3s linear infinite;}
@keyframes spinBorder{to{transform:rotate(360deg);}}
@keyframes playPulse{0%,100%{box-shadow:0 8px 30px rgba(255,100,0,.55),0 0 0 0 rgba(255,140,0,.5);}50%{box-shadow:0 8px 50px rgba(255,100,0,.8),0 0 0 14px rgba(255,140,0,0);}}
.btn-play:active{transform:scale(.93);}
.mstar{position:fixed;pointer-events:none;z-index:2;animation:mstarFloat var(--d) linear infinite;left:var(--x);top:var(--y);font-size:var(--s);opacity:var(--o);}
@keyframes mstarFloat{0%{transform:translateY(0) rotate(0);}100%{transform:translateY(-110vh) rotate(360deg);opacity:0;}}

/* ── GAME LAYOUT ── */
#gameScreen{flex-direction:column;justify-content:flex-start;padding:0;background:transparent;overflow:hidden;}

/* TOP BAR */
#topBar{width:100%;z-index:20;background:var(--panel);border-bottom:1.5px solid var(--border);backdrop-filter:blur(18px);padding:calc(var(--safe-top) + 8px) 14px 8px;display:flex;align-items:center;justify-content:space-between;gap:8px;flex-shrink:0;}
.top-coins-val{font-family:'Fredoka One',cursive;font-size:clamp(20px,5.5vw,28px);color:#FFD700;text-shadow:0 0 12px rgba(255,215,0,.7);line-height:1;}
.top-coins-label{font-size:11px;color:#FF8C00;letter-spacing:1px;}
.top-cps{font-family:'Fredoka One',cursive;font-size:clamp(13px,4vw,18px);color:#FFD700;opacity:.75;}
.top-stats{display:flex;flex-direction:column;align-items:flex-end;gap:1px;font-size:10px;color:rgba(255,215,0,.6);}
.top-stats span{color:#FFD700;font-weight:700;}

/* COOKIE AREA */
#cookieArea{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative;overflow:hidden;min-height:0;}
#mainCookieWrap{perspective:900px;user-select:none;display:flex;align-items:center;justify-content:center;cursor:pointer;}
#mainCookie{font-size:clamp(110px,32vw,180px);display:block;line-height:1;animation:cook3D 7s ease-in-out infinite;filter:drop-shadow(0 0 30px #FF8C00) drop-shadow(0 15px 40px rgba(0,0,0,.7));transform-style:preserve-3d;transition:filter .1s;}
@keyframes cook3D{0%{transform:rotateY(0deg) rotateX(6deg);}25%{transform:rotateY(14deg) rotateX(0deg);}50%{transform:rotateY(0deg) rotateX(-6deg);}75%{transform:rotateY(-14deg) rotateX(0deg);}100%{transform:rotateY(0deg) rotateX(6deg);}}
#mainCookieWrap:active #mainCookie{animation-play-state:paused;transform:rotateX(28deg) scale(.9) !important;filter:drop-shadow(0 0 60px #FFD700) drop-shadow(0 5px 15px rgba(0,0,0,.8));}
#clickInfo{font-family:'Fredoka One',cursive;font-size:clamp(13px,4vw,18px);color:#FF8C00;text-shadow:0 0 10px rgba(255,140,0,.5);margin-top:4px;text-align:center;}
#boostBadge{font-family:'Fredoka One',cursive;font-size:clamp(12px,3.8vw,16px);color:#FF00FF;text-shadow:0 0 14px #FF00FF;animation:bblink .5s ease-in-out infinite;display:none;text-align:center;margin-top:2px;}
@keyframes bblink{0%,100%{opacity:1;}50%{opacity:.45;}}

/* TAB BAR */
#tabBar{width:100%;flex-shrink:0;display:flex;background:var(--panel);border-top:1.5px solid var(--border);backdrop-filter:blur(18px);z-index:20;}
.tab-btn{flex:1;padding:10px 4px calc(var(--safe-bot) + 10px);border:none;background:transparent;color:rgba(255,215,0,.45);font-family:'Fredoka One',cursive;font-size:clamp(10px,3.2vw,14px);cursor:pointer;transition:all .2s;display:flex;flex-direction:column;align-items:center;gap:2px;}
.tab-btn .ti{font-size:clamp(18px,5.5vw,26px);}
.tab-btn.active{color:#FFD700;}
.tab-btn.active .ti{filter:drop-shadow(0 0 6px #FFD700);}

/* BOTTOM PANEL */
#bottomPanel{position:fixed;bottom:0;left:0;right:0;z-index:19;max-height:55vh;background:var(--panel);backdrop-filter:blur(22px);border-top:1.5px solid var(--border);overflow-y:auto;overscroll-behavior:contain;-webkit-overflow-scrolling:touch;padding:12px 10px calc(var(--safe-bot) + 64px);transform:translateY(100%);transition:transform .4s cubic-bezier(.34,1.2,.64,1);}
#bottomPanel.open{transform:translateY(0);}
::-webkit-scrollbar{width:3px;}::-webkit-scrollbar-thumb{background:rgba(255,140,0,.3);border-radius:2px;}

.panel-title{font-family:'Fredoka One',cursive;font-size:clamp(15px,4.5vw,20px);color:#FFD700;text-align:center;border-bottom:1px solid rgba(255,215,0,.25);padding-bottom:8px;margin-bottom:10px;letter-spacing:1px;}

/* CARDS */
.item-card{background:linear-gradient(135deg,rgba(40,15,0,.95),rgba(60,22,0,.85));border:1px solid rgba(255,140,0,.22);border-radius:14px;padding:11px 13px;margin-bottom:9px;cursor:pointer;transition:transform .18s cubic-bezier(.34,1.56,.64,1),border-color .18s,box-shadow .18s;position:relative;overflow:hidden;user-select:none;}
.item-card:active{transform:scale(.96);}
.item-card.can-buy{border-color:rgba(255,215,0,.42);}
.item-card.locked{opacity:.46;cursor:default;}
.item-card.boost-card{background:linear-gradient(135deg,rgba(30,0,40,.95),rgba(50,0,60,.85));border-color:rgba(255,0,200,.22);}
.item-card.boost-card.can-buy{border-color:rgba(255,0,200,.5);}
.item-card.upgrade-card{background:linear-gradient(135deg,rgba(0,20,40,.95),rgba(0,35,55,.85));border-color:rgba(0,180,255,.22);}
.item-card.upgrade-card.can-buy{border-color:rgba(0,180,255,.5);}
.item-row{display:flex;align-items:center;gap:10px;}
.ie{font-size:clamp(26px,8vw,36px);flex-shrink:0;}
.ii{flex:1;min-width:0;}
.in{font-weight:800;font-size:clamp(12px,3.8vw,15px);color:#FFF;}
.id{font-size:clamp(10px,2.8vw,12px);color:rgba(255,200,100,.65);margin-top:1px;line-height:1.35;}
.ip{font-family:'Fredoka One',cursive;font-size:clamp(14px,4.2vw,18px);color:#FFD700;flex-shrink:0;}
.ip.m{color:#FF00FF;}.ip.u{color:#00BFFF;}
.cnt-badge{position:absolute;top:6px;right:8px;background:rgba(255,140,0,.85);border-radius:10px;font-size:11px;font-weight:800;padding:1px 7px;color:#fff;}
.pb{height:5px;background:rgba(255,215,0,.12);border-radius:20px;margin-top:6px;overflow:hidden;}
.pf{height:100%;border-radius:20px;background:linear-gradient(90deg,#FFD700,#FF8C00);transition:width .3s;box-shadow:0 0 6px rgba(255,215,0,.4);}
.pfm{background:linear-gradient(90deg,#FF00FF,#7B00FF);}

/* FX */
.particle{position:fixed;pointer-events:none;z-index:999;font-family:'Fredoka One',cursive;font-size:clamp(18px,5vw,24px);color:#FFD700;text-shadow:0 0 8px #FF8C00;animation:pflyup 1.1s ease-out forwards;white-space:nowrap;}
@keyframes pflyup{0%{opacity:1;transform:translateY(0) scale(1);}100%{opacity:0;transform:translateY(-110px) scale(.5);}}
.crumb{position:fixed;pointer-events:none;z-index:999;font-size:clamp(14px,4vw,20px);animation:crumbAnim 1s ease-out forwards;}
@keyframes crumbAnim{0%{opacity:1;transform:translate(0,0) rotate(0) scale(1);}100%{opacity:0;transform:translate(var(--dx),var(--dy)) rotate(540deg) scale(0);}}
.ripple{position:fixed;border-radius:50%;pointer-events:none;z-index:997;border:3px solid rgba(255,215,0,.55);animation:rippleEx .7s ease-out forwards;}
@keyframes rippleEx{0%{width:0;height:0;opacity:1;}100%{width:160px;height:160px;opacity:0;}}
.gold-drop{position:fixed;pointer-events:none;z-index:998;font-size:22px;animation:dropAnim var(--dr) ease-in forwards;left:var(--lx);top:-40px;}
@keyframes dropAnim{0%{top:-40px;opacity:1;transform:rotate(0);}100%{top:105vh;opacity:0;transform:rotate(var(--rr));}}
.notif{position:fixed;top:0;left:50%;transform:translateX(-50%) translateY(-90px);background:linear-gradient(135deg,#FF8C00,#FF4500);color:#fff;font-family:'Fredoka One',cursive;font-size:clamp(15px,4.5vw,20px);padding:10px 28px;border-radius:30px;box-shadow:0 8px 24px rgba(255,100,0,.5);z-index:1000;pointer-events:none;transition:transform .5s cubic-bezier(.34,1.56,.64,1);white-space:nowrap;}
.notif.show{transform:translateX(-50%) translateY(calc(var(--safe-top) + 12px));}
.auto-ck{position:fixed;pointer-events:none;z-index:996;font-size:18px;animation:autoCkAnim var(--dur) linear forwards;}
@keyframes autoCkAnim{0%{opacity:.8;transform:translate(0,0) scale(1);}100%{opacity:0;transform:translate(var(--dx),var(--dy)) scale(.2);}}
</style>
</head>
<body>

<canvas id="bgCanvas"></canvas>

<!-- MENU -->
<div class="screen" id="menuScreen">
  <div class="menu-cookie" id="menuEmoji">🍪</div>
  <div class="game-title">COOKIE 3D</div>
  <div class="menu-sub">✨ Clicker Ultra ✨</div>
  <button class="btn-play" id="btnPlay">▶ JOGAR</button>
</div>

<!-- GAME -->
<div class="screen hidden" id="gameScreen">
  <div id="topBar">
    <div>
      <div class="top-coins-val" id="coinsVal">0</div>
      <div class="top-coins-label">🪙 MOEDAS</div>
    </div>
    <div class="top-cps" id="cpsVal">0/s</div>
    <div class="top-stats">
      <div>Cliques: <span id="statClicks">0</span></div>
      <div>Mult: <span id="statMult">×1</span></div>
    </div>
  </div>

  <div id="cookieArea">
    <div id="mainCookieWrap">
      <span id="mainCookie">🍪</span>
    </div>
    <div id="clickInfo">+1 por toque</div>
    <div id="boostBadge">⚡ BOOST ATIVO!</div>
  </div>

  <div id="tabBar">
    <button class="tab-btn active" onclick="switchTab('shop',this)"><span class="ti">🛒</span>Loja</button>
    <button class="tab-btn" onclick="switchTab('boost',this)"><span class="ti">⚡</span>Boosts</button>
    <button class="tab-btn" onclick="switchTab('upgrade',this)"><span class="ti">⬆️</span>Upgrades</button>
  </div>

  <div id="bottomPanel"></div>
</div>

<div class="notif" id="notif">✅</div>

<script>
// ── BG ──
const cvs=document.getElementById('bgCanvas'),bx=cvs.getContext('2d');
let W,H;
const stars=Array.from({length:160},()=>({x:(Math.random()-.5)*2000,y:(Math.random()-.5)*2000,z:Math.random()*2000,s:Math.random()*2+.5}));
function resizeCvs(){W=cvs.width=innerWidth;H=cvs.height=innerHeight;}
window.addEventListener('resize',resizeCvs);resizeCvs();
function drawBg(){
  bx.clearRect(0,0,W,H);
  const g=bx.createRadialGradient(W/2,H/2,0,W/2,H/2,Math.max(W,H));
  g.addColorStop(0,'#2a0900');g.addColorStop(.5,'#120400');g.addColorStop(1,'#050009');
  bx.fillStyle=g;bx.fillRect(0,0,W,H);
  const t=Date.now()*.0004;
  [[.25,.45,'rgba(255,60,0,.06)'],[.5,.55,'rgba(100,0,200,.04)'],[.75,.4,'rgba(255,130,0,.05)']].forEach(([rx,ry,col],i)=>{
    const nx=W*rx+Math.sin(t+i)*80,ny=H*ry+Math.cos(t*.7+i)*60;
    const ng=bx.createRadialGradient(nx,ny,0,nx,ny,150+i*40);
    ng.addColorStop(0,col);ng.addColorStop(1,'transparent');
    bx.fillStyle=ng;bx.fillRect(0,0,W,H);
  });
  stars.forEach(s=>{
    s.z-=1.2;if(s.z<=0)s.z=2000;
    const px=(s.x/s.z)*500+W/2,py=(s.y/s.z)*500+H/2,r=(1-s.z/2000)*3,op=1-s.z/2000;
    if(px<0||px>W||py<0||py>H)return;
    bx.save();bx.globalAlpha=op*.8;bx.fillStyle=`hsl(${35+s.s*15},80%,90%)`;
    bx.beginPath();bx.arc(px,py,r*s.s,0,Math.PI*2);bx.fill();bx.restore();
  });
  requestAnimationFrame(drawBg);
}
drawBg();

// ── AUDIO ──
let actx;
function ac(){if(!actx)actx=new(window.AudioContext||window.webkitAudioContext)();return actx;}
function beep(f,type,dur,vol){const c=ac(),o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.type=type||'sine';o.frequency.value=f;g.gain.setValueAtTime(vol||.2,c.currentTime);g.gain.exponentialRampToValueAtTime(.001,c.currentTime+dur);o.start();o.stop(c.currentTime+dur);}
function playClick(){const c=ac(),o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.frequency.setValueAtTime(700+Math.random()*500,c.currentTime);o.frequency.exponentialRampToValueAtTime(350,c.currentTime+.12);g.gain.setValueAtTime(.22,c.currentTime);g.gain.exponentialRampToValueAtTime(.001,c.currentTime+.12);o.type='sine';o.start();o.stop(c.currentTime+.15);}
function playBuy(){[523,659,784,1047].forEach((f,i)=>setTimeout(()=>beep(f,'sine',.25,.16),i*80));}
function playBoost(){const c=ac(),o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.type='sawtooth';o.frequency.setValueAtTime(250,c.currentTime);o.frequency.exponentialRampToValueAtTime(1400,c.currentTime+.35);g.gain.setValueAtTime(.26,c.currentTime);g.gain.exponentialRampToValueAtTime(.001,c.currentTime+.5);o.start();o.stop(c.currentTime+.5);}
function playErr(){beep(180,'square',.2,.16);}
let musicOn=false;
function startMusic(){if(musicOn)return;musicOn=true;const notes=[261,293,329,349,392,440,493,523,440,392,349,329];let i=0;function n(){beep(notes[i%notes.length],'triangle',.35,.032);i++;setTimeout(n,420);}setTimeout(n,400);}

// ── STATE ──
let coins=0,totalEarned=0,totalClicks=0,clickPower=1,clickMult=1,cpsMult=1,boostMult=1;
let boostInterval=null,panelOpen=false,currentTab='shop';

const shopDefs=[
  {id:'cursor', name:'Cursor Mágico',     emoji:'🖱️',desc:'+0.1/s cada',       baseCost:100,    cps:.1,  count:0},
  {id:'granny', name:'Avozinha',          emoji:'👵',desc:'+0.5/s cada',        baseCost:500,    cps:.5,  count:0},
  {id:'farm',   name:'Fazenda',           emoji:'🌾',desc:'+3/s cada',          baseCost:2000,   cps:3,   count:0},
  {id:'factory',name:'Fábrica',           emoji:'🏭',desc:'+15/s cada',         baseCost:10000,  cps:15,  count:0},
  {id:'mine',   name:'Mina de Chocolate', emoji:'⛏️',desc:'+80/s cada',         baseCost:50000,  cps:80,  count:0},
  {id:'lab',    name:'Laboratório',       emoji:'🔬',desc:'+300/s cada',        baseCost:150000, cps:300, count:0},
  {id:'portal', name:'Portal Dimensional',emoji:'🌀',desc:'+1200/s cada',       baseCost:500000, cps:1200,count:0},
  {id:'cosmos', name:'Fábrica Universal', emoji:'🌌',desc:'+5000/s cada',       baseCost:1000000,cps:5000,count:0},
];
const boostDefs=[
  {id:'b2x', name:'Boost 2×',      emoji:'⚡',desc:'Tudo ×2 por 30s',    cost:200,  eff:'m2', dur:30},
  {id:'b5x', name:'Boost 5×',      emoji:'🔥',desc:'Tudo ×5 por 20s!',   cost:1500, eff:'m5', dur:20},
  {id:'gold',name:'Chuva de Ouro', emoji:'✨',desc:'Bônus instantâneo!',  cost:800,  eff:'rain',dur:0},
  {id:'fr',  name:'Frenesi 10×',   emoji:'💥',desc:'×10 por 15s',        cost:5000, eff:'m10',dur:15},
  {id:'mega',name:'MEGA 50×',      emoji:'🚀',desc:'×50 em TUDO 10s!!!', cost:50000,eff:'m50',dur:10},
];
const upgradeDefs=[
  {id:'u1',name:'Polegar Forte',emoji:'💪',desc:'+2 por toque',   cost:150,   bought:false,eff:'c+2'},
  {id:'u2',name:'Dois Dedos',   emoji:'✌️',desc:'Clique ×2',     cost:1000,  bought:false,eff:'cx2'},
  {id:'u3',name:'Mão Ninja',    emoji:'🥷',desc:'Clique ×3',     cost:8000,  bought:false,eff:'cx3'},
  {id:'u4',name:'Eficiência',   emoji:'⚙️',desc:'CPS +50%',      cost:3000,  bought:false,eff:'ps15'},
  {id:'u5',name:'Turbo Auto',   emoji:'🔧',desc:'CPS ×2',        cost:25000, bought:false,eff:'ps2'},
  {id:'u6',name:'Ultra CPS',    emoji:'🛸',desc:'CPS ×3',        cost:100000,bought:false,eff:'ps3'},
  {id:'u7',name:'Mão Divina',   emoji:'🤲',desc:'+10 por toque', cost:500000,bought:false,eff:'c+10'},
];

function getCost(it){return Math.floor(it.baseCost*Math.pow(1.15,it.count));}
function getCPS(){return shopDefs.reduce((a,it)=>a+it.cps*it.count,0)*cpsMult;}
function fmt(n){if(n>=1e9)return(n/1e9).toFixed(2)+'B';if(n>=1e6)return(n/1e6).toFixed(2)+'M';if(n>=1000)return(n/1000).toFixed(1)+'K';return Math.floor(n)+'';}

// ── RENDER ──
function switchTab(tab,btn){
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  const p=document.getElementById('bottomPanel');
  if(currentTab===tab&&panelOpen){p.classList.remove('open');panelOpen=false;return;}
  currentTab=tab;panelOpen=true;
  renderPanel();
  requestAnimationFrame(()=>p.classList.add('open'));
}

function renderPanel(){
  const el=document.getElementById('bottomPanel');
  if(currentTab==='shop') el.innerHTML=buildShop();
  else if(currentTab==='boost') el.innerHTML=buildBoosts();
  else el.innerHTML=buildUpgrades();
}

function buildShop(){
  let h=`<div class="panel-title">🛒 LOJA DE BISCOITOS</div>`;
  shopDefs.forEach(it=>{
    const cost=getCost(it),can=coins>=cost,pct=Math.min(100,Math.floor(coins/cost*100));
    h+=`<div class="item-card${can?' can-buy':' locked'}" onclick="${can?`doShop('${it.id}')`:''}">${it.count>0?`<div class="cnt-badge">${it.count}</div>`:''}<div class="item-row"><span class="ie">${it.emoji}</span><div class="ii"><div class="in">${it.name}</div><div class="id">${it.desc}</div></div><div class="ip">🪙${fmt(cost)}</div></div><div class="pb"><div class="pf" style="width:${pct}%"></div></div></div>`;
  });
  return h;
}

function buildBoosts(){
  let h=`<div class="panel-title">⚡ BOOSTS</div>`;
  boostDefs.forEach(it=>{
    const can=coins>=it.cost,pct=Math.min(100,Math.floor(coins/it.cost*100));
    h+=`<div class="item-card boost-card${can?' can-buy':' locked'}" onclick="${can?`doBoost('${it.id}')`:''}""><div class="item-row"><span class="ie">${it.emoji}</span><div class="ii"><div class="in">${it.name}</div><div class="id">${it.desc}</div></div><div class="ip m">🪙${fmt(it.cost)}</div></div><div class="pb"><div class="pf pfm" style="width:${pct}%"></div></div></div>`;
  });
  return h;
}

function buildUpgrades(){
  let h=`<div class="panel-title">⬆️ UPGRADES</div>`;
  const avail=upgradeDefs.filter(u=>!u.bought);
  if(!avail.length)return h+`<div style="text-align:center;color:rgba(255,215,0,.5);margin-top:20px;font-size:14px">✅ Todos adquiridos!</div>`;
  avail.forEach(it=>{
    const can=coins>=it.cost;
    h+=`<div class="item-card upgrade-card${can?' can-buy':' locked'}" onclick="${can?`doUpgrade('${it.id}')`:''}""><div class="item-row"><span class="ie">${it.emoji}</span><div class="ii"><div class="in">${it.name}</div><div class="id">${it.desc}</div></div><div class="ip u">🪙${fmt(it.cost)}</div></div></div>`;
  });
  return h;
}

function updateHUD(){
  const cps=getCPS();
  document.getElementById('coinsVal').textContent=fmt(coins);
  document.getElementById('cpsVal').textContent=fmt(cps)+'/s';
  document.getElementById('statClicks').textContent=fmt(totalClicks);
  document.getElementById('statMult').textContent='×'+(clickMult*boostMult);
  document.getElementById('clickInfo').textContent=`+${fmt(clickPower*clickMult*boostMult)} por toque`;
}

// ── ACTIONS ──
function doShop(id){
  const it=shopDefs.find(s=>s.id===id),cost=getCost(it);
  if(coins<cost){playErr();return;}
  coins-=cost;it.count++;playBuy();spawnGold(5);showNotif(`${it.emoji} ${it.name} comprado!`);
  updateHUD();if(panelOpen)renderPanel();
}

function doBoost(id){
  const it=boostDefs.find(b=>b.id===id);
  if(coins<it.cost){playErr();return;}
  coins-=it.cost;playBoost();showNotif(`${it.emoji} ${it.name} ATIVADO!`);
  if(it.eff==='rain'){
    const bonus=Math.floor(coins*.18+300);
    coins+=bonus;totalEarned+=bonus;spawnGold(25);showNotif(`💰 +${fmt(bonus)} moedas!`);
  } else {
    const m={m2:2,m5:5,m10:10,m50:50}[it.eff]||2;
    timedBoost(m,it.dur);
  }
  updateHUD();if(panelOpen)renderPanel();
}

function timedBoost(mult,sec){
  if(boostInterval)clearInterval(boostInterval);
  boostMult=mult;let rem=sec;
  const b=document.getElementById('boostBadge');
  b.style.display='block';b.textContent=`🚀 ×${mult} ATIVO (${rem}s)`;
  boostInterval=setInterval(()=>{rem--;b.textContent=`🚀 ×${mult} ATIVO (${rem}s)`;if(rem<=0){clearInterval(boostInterval);boostMult=1;b.style.display='none';}},1000);
}

function doUpgrade(id){
  const it=upgradeDefs.find(u=>u.id===id);
  if(!it||it.bought||coins<it.cost){playErr();return;}
  coins-=it.cost;it.bought=true;playBuy();
  const e=it.eff;
  if(e==='c+2')clickPower+=2;else if(e==='cx2')clickMult*=2;else if(e==='cx3')clickMult*=3;
  else if(e==='ps15')cpsMult*=1.5;else if(e==='ps2')cpsMult*=2;else if(e==='ps3')cpsMult*=3;
  else if(e==='c+10')clickPower+=10;
  showNotif(`⬆️ ${it.name} ativado!`);updateHUD();if(panelOpen)renderPanel();
}

// ── TOUCH ──
const wrap=document.getElementById('mainCookieWrap');
wrap.addEventListener('touchstart',e=>{e.preventDefault();const t=e.touches[0];doClick(t.clientX,t.clientY);},{passive:false});
wrap.addEventListener('click',e=>doClick(e.clientX,e.clientY));

function doClick(x,y){
  ac();totalClicks++;
  const earned=clickPower*clickMult*boostMult;
  coins+=earned;totalEarned+=earned;
  playClick();spawnParticle(x,y,earned);spawnCrumbs(x,y);spawnRipple(x,y);
  updateHUD();
}

// ── FX ──
function spawnParticle(x,y,n){const p=document.createElement('div');p.className='particle';p.textContent='+'+fmt(n)+' 🪙';p.style.cssText=`left:${x-50}px;top:${y-24}px;`;document.body.appendChild(p);setTimeout(()=>p.remove(),1100);}
function spawnCrumbs(x,y){['🟤','💛','🟠','🍫'].forEach((v,i)=>{const c=document.createElement('div');c.className='crumb';c.textContent=v;const a=(Math.random()*360)*Math.PI/180,d=50+Math.random()*80;c.style.cssText=`left:${x}px;top:${y}px;--dx:${Math.cos(a)*d}px;--dy:${Math.sin(a)*d}px;`;document.body.appendChild(c);setTimeout(()=>c.remove(),1000);});}
function spawnRipple(x,y){const r=document.createElement('div');r.className='ripple';r.style.cssText=`left:${x-80}px;top:${y-80}px;`;document.body.appendChild(r);setTimeout(()=>r.remove(),700);}
function spawnGold(n=6){for(let i=0;i<n;i++){const c=document.createElement('div');c.className='gold-drop';c.textContent=['🪙','💰','✨','🌟'][Math.floor(Math.random()*4)];c.style.cssText=`--lx:${Math.random()*90}vw;--dr:${1.5+Math.random()*2}s;--rr:${Math.random()*600-300}deg;`;document.body.appendChild(c);setTimeout(()=>c.remove(),4000);}}
let nTO;
function showNotif(msg){const el=document.getElementById('notif');el.textContent=msg;el.classList.add('show');clearTimeout(nTO);nTO=setTimeout(()=>el.classList.remove('show'),2300);}

// auto-cookie anim
setInterval(()=>{const cps=getCPS();if(cps<=0)return;const c=document.createElement('div');c.className='auto-ck';c.textContent='🍪';const a=Math.random()*Math.PI*2,d=80+Math.random()*120;c.style.cssText=`left:${30+Math.random()*40}vw;top:${25+Math.random()*50}vh;--dx:${Math.cos(a)*d}px;--dy:${Math.sin(a)*d}px;--dur:${1+Math.random()*1.5}s;`;document.body.appendChild(c);setTimeout(()=>c.remove(),2500);},800);

// close panel on cookie tap
document.getElementById('cookieArea').addEventListener('touchstart',e=>{
  const p=document.getElementById('bottomPanel');
  if(panelOpen&&!p.contains(e.target)&&!document.getElementById('tabBar').contains(e.target)){
    p.classList.remove('open');panelOpen=false;
  }
},{passive:true});

// menu stars
for(let i=0;i<25;i++){const s=document.createElement('div');s.className='mstar';s.textContent=['🌟','✨','💫','⭐','🍪'][Math.floor(Math.random()*5)];s.style.cssText=`--s:${12+Math.random()*18}px;--o:${.15+Math.random()*.45};--d:${7+Math.random()*12}s;--x:${Math.random()*100}vw;--y:${Math.random()*100}vh;animation-delay:${-Math.random()*12}s`;document.body.appendChild(s);}

// game loop
let lastT=Date.now();
function loop(){const now=Date.now(),dt=(now-lastT)/1000;lastT=now;const gained=getCPS()*dt*boostMult;if(gained>0){coins+=gained;totalEarned+=gained;}requestAnimationFrame(loop);}
setInterval(updateHUD,120);
setInterval(()=>{if(panelOpen)renderPanel();},600);

document.getElementById('btnPlay').addEventListener('click',()=>{
  ac();startMusic();
  document.getElementById('menuScreen').classList.add('hidden');
  setTimeout(()=>{document.getElementById('gameScreen').classList.remove('hidden');updateHUD();loop();spawnGold(8);showNotif('🍪 Toque no biscoito!');},450);
});
document.getElementById('menuEmoji').addEventListener('touchstart',e=>{e.preventDefault();ac();playClick();},{passive:false});
</script>
</body>
</html>
